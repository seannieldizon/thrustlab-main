<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&family=Inter:wght@400&family=Concert+One&display=swap"
		rel="stylesheet">
	<style>
		/* Prevent white flash on initial load */
		html,
		body {
			background: linear-gradient(180deg, #1b3558 0%, #2a4870 100%);
			margin: 0;
			padding: 0;
		}

		/* Loading overlay */
		#app-loader {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: linear-gradient(180deg, #1b3558 0%, #2a4870 100%);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 9999;
			opacity: 1;
			transition: opacity 0.5s ease-out;
		}

		#app-loader.loaded {
			opacity: 0;
			pointer-events: none;
		}

		.loader-spinner {
			width: 50px;
			height: 50px;
			border: 4px solid rgba(255, 255, 255, 0.2);
			border-top-color: #87CEEB;
			border-radius: 50%;
			animation: spin 1s linear infinite;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}
	</style>
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="viewport">
	<div id="app-loader">
		<div class="loader-spinner"></div>
	</div>
	<div style="display: contents">%sveltekit.body%</div>
	<script>
		// Remove loader once the app is ready
		window.addEventListener('load', () => {
			setTimeout(() => {
				const loader = document.getElementById('app-loader');
				if (loader) {
					loader.classList.add('loaded');
					setTimeout(() => loader.remove(), 500);
				}
			}, 300);
		});
	</script>
</body>

</html>
